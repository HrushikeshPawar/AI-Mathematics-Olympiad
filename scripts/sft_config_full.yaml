## Data
# dataset: 'Hrushi/ORPO-Gemma-1.1-7b-IT-Part-1a'
dataset: 'Hrushi/SFT-MetaMath-MATH-TrainingData'

## Model arguments
# model_name_or_path: "google/gemma-1.1-7b-it"
model_name_or_path: "deepseek-ai/deepseek-math-7b-rl"
tokenizer_name_or_path: "deepseek-ai/deepseek-math-7b-rl"
model_revision: main

### bnb arguments
load_in_4bit: true
bnb_4bit_quant_type: 'nf4'
use_bnb_nested_quant: true
torch_dtype: 'float16'

### LoRA Config
lora_r: 16
lora_alpha: 64
lora_dropout: 0.01
lora_target_modules: ['q_proj', 'k_proj', 'v_proj', 'o_proj', 'gate_proj', 'up_proj', 'down_proj']

## ORPO Training Arguments
max_seq_length: 4096
# max_prompt_length: 512
# beta: 0.1
learning_rate: 0.0003 #3e-4 # 8e-6
lr_scheduler_type: 'cosine'
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
num_train_epochs: 1
warmup_ratio: 0.01
logging_steps: 1
gradient_checkpointing: true
dataset_text_field: 'text'
output_dir: 'Training_Outputs/'
overwrite_output_dir: true
report_to: 'wandb'
optim: 'paged_adamw_8bit'
remove_unused_columns: true
# truncation_mode: 'keep_end'
push_to_hub: True
resume_from_checkpoint: false
hub_strategy: "all_checkpoints"
hub_private_repo: true
save_strategy: 'steps'
save_steps: 500