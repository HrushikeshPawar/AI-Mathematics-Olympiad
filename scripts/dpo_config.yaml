## Data
dataset: 'Hrushi/DPO-DeepseekMath-Base-TrainingData'

## Model arguments
model_name_or_path: "Hrushi/AIMO-SFT-DDP-deepseek-math-7b-base-N141128-E1-R128-A256"
tokenizer_name_or_path: "Hrushi/AIMO-SFT-DDP-Merged-Deepseek-Math-7B-RL-N141128-E1-R16-A64"
adapter_path: "DeepseekMath-Base-Adapter"
adapter_repo_id: "Hrushi/AIMO-SFT-DDP-deepseek-math-7b-base-N141128-E1-R128-A256"
model_revision: main

### bnb arguments
load_in_4bit: true
bnb_4bit_quant_type: 'nf4'
use_bnb_nested_quant: true
torch_dtype: 'bfloat16'

### LoRA Config
lora_r: 16
lora_alpha: 64
lora_dropout: 0.01
lora_target_modules: ['q_proj', 'k_proj', 'v_proj', 'o_proj', 'gate_proj', 'up_proj', 'down_proj']

## DPO Training Arguments
loss_type: "ipo"
# model_adapter_name: "trainer"
# ref_adapter_name: "reference"
max_length: 4096
max_prompt_length: 4096
beta: 0.1
learning_rate: 0.0003 #3e-4 # 8e-6
lr_scheduler_type: 'cosine'
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
# num_train_epochs: 1
max_steps: 10
warmup_ratio: 0.01
logging_steps: 1
gradient_checkpointing: true
remove_unused_columns: false
output_dir: 'Training_Outputs/'
overwrite_output_dir: true
report_to: 'wandb'
optim: 'rmsprop_bnb'
push_to_hub: True
resume_from_checkpoint: false
hub_strategy: "all_checkpoints"
hub_private_repo: true
save_strategy: 'steps'
save_steps: 500